name: "Build unsigned IPA"
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"

targets:
  WakeOnLan:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WakeOnLanApp
        excludes:
          - "*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wakeonlan
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "同じネットワーク内のPCを操作するために使用します"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

schemes:
  WakeOnLan:
    build:
      targets:
        WakeOnLan: all
    archive:
      config: Release
